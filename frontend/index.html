<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Leaderboard | Web3</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="container">
        <header>
            <h1>🏆 <span>Stellar</span> Leaderboard</h1>
            <button id="connectBtn" class="btn-primary">
                <span class="icon">🌐</span> Connect Wallet
            </button>
        </header>

        <main class="grid-layout">
            <section class="card glass">
                <h3>📝 Submit Score</h3>
                <form id="scoreForm">
                    <div class="input-group">
                        <label>Player Name</label>
                        <input type="text" id="playerName" placeholder="e.g. Satoshi_01" required />
                    </div>
                    <div class="input-group">
                        <label>Final Score</label>
                        <input type="number" id="score" placeholder="0000" required />
                    </div>
                    <button type="submit" id="submitBtn" class="btn-submit">
                        Push to Blockchain
                    </button>
                </form>
            </section>

            <section class="card glass">
                <h3>🔥 Top Players</h3>
                <div class="table-container">
                    <table id="scoreTable">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Player</th>
                                <th>Score</th>
                                <th style="text-align: right;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
