<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web3 Game Leaderboard</title>
    <style>
      body { font-family: 'Inter', sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
      .card { background-color: #f9f9f9; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-top: 20px;}
      button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
      #connectBtn { background-color: #008CBA; color: white; margin: 0 auto; display: block;}
      #submitBtn { background-color: #FF9800; color: white; width: 100%; margin-top: 15px;}
      .delete-btn { background-color: #f44336; color: white; padding: 5px 10px; font-size: 12px; }
      input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; margin-bottom: 15px;}
      table { width: 100%; border-collapse: collapse; margin-top: 15px; }
      th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
      th { background-color: #eee; }
    </style>
  </head>
  <body>
    <h1 style="text-align: center; color: #333;">🏆 Web3 Game Leaderboard</h1>
    
    <button id="connectBtn">🔗 Connect Freighter Wallet</button>

    <div class="card">
      <h2>Catat Skor Baru (Create)</h2>
      <form id="scoreForm">
        <label>Nama Pemain:</label>
        <input type="text" id="playerName" placeholder="Masukkan nama..." required />

        <label>Skor:</label>
        <input type="number" id="score" placeholder="Contoh: 9500" required />

        <button type="submit" id="submitBtn">🚀 Submit ke Blockchain</button>
      </form>
    </div>

    <div class="card">
      <h2>Leaderboard (Read & Delete)</h2>
      <table id="scoreTable">
        <thead>
          <tr>
            <th>Pemain</th>
            <th>Skor</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          </tbody>
      </table>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
